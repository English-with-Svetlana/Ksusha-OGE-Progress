<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ksusha's OGE Progress (ФИПИ tests)</title>
    <style>
        :root {
            --bg-color: #e0f7fa;
            --card-bg: #ffffff;
            --primary-blue: #0288d1;
            --accent-green: #66bb6a;
            --accent-yellow: #fdd835;
            --text-color: #37474f;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            -webkit-text-size-adjust: 100%;
        }

        header {
            background: linear-gradient(135deg, var(--primary-blue), #4fc3f7);
            color: white;
            padding: 15px;
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            background-color: #fff;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            text-align: center;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .variant-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent-green);
        }

        .variant-title {
            font-size: 1.2rem;
            color: var(--primary-blue);
            margin-bottom: 12px;
            font-weight: bold;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(75px, 1fr));
            gap: 8px;
            margin-bottom: 15px;
        }

        .task-item {
            background-color: #f1f8e9;
            padding: 8px 4px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #c8e6c9;
            min-width: 0;
        }

        .task-label {
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 5px;
            display: block;
            word-wrap: break-word;
            line-height: 1.2;
        }

        .score-box {
            width: 100%;
            padding: 6px 2px;
            font-size: 0.95rem;
            text-align: center;
            border: 2px solid var(--accent-yellow);
            border-radius: 6px;
            color: var(--primary-blue);
            font-weight: bold;
            background-color: white;
            display: inline-block;
            box-sizing: border-box;
        }

        .final-result {
            background-color: #fffde7;
            border: 2px dashed var(--accent-yellow);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            flex-wrap: nowrap;
            gap: 15px;
        }

        .final-label {
            font-weight: bold;
            font-size: 1rem;
            color: #fbc02d;
            white-space: nowrap;
        }

        .grading-scale {
            font-size: 0.75rem;
            color: #555;
            text-align: center;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .grade-line {
            display: inline;
        }

        .grade-mark {
            color: #d32f2f;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .final-score {
            padding: 8px 15px;
            font-size: 1.05rem;
            text-align: center;
            border: 2px solid var(--accent-green);
            border-radius: 6px;
            font-weight: bold;
            background-color: white;
            color: var(--primary-blue);
            min-width: 70px;
            white-space: nowrap;
        }

        /* Desktop styles */
        @media (min-width: 768px) {
            body {
                padding: 20px;
            }

            header {
                justify-content: space-between;
                padding: 20px;
                margin-bottom: 30px;
            }

            .header-info {
                gap: 15px;
            }

            .avatar {
                width: 80px;
                height: 80px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .variant-card {
                padding: 20px;
            }

            .variant-title {
                font-size: 1.4rem;
                margin-bottom: 15px;
            }

            .tasks-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
                gap: 12px;
                margin-bottom: 20px;
            }

            .task-item {
                padding: 10px;
            }

            .task-label {
                font-size: 0.85rem;
            }

            .score-box {
                padding: 8px;
                font-size: 1.1rem;
            }

            .final-result {
                padding: 15px;
            }

            .final-label {
                font-size: 1.1rem;
            }

            .grading-scale {
                font-size: 0.75rem;
            }

            .grade-line {
                display: inline;
            }

            .final-score {
                padding: 10px 20px;
                font-size: 1.2rem;
                min-width: 80px;
            }
        }

        /* Mobile styles */
        @media (max-width: 767px) {
            .final-result {
                flex-wrap: wrap;
                gap: 10px;
            }

            .grading-scale {
                width: 100%;
                white-space: normal;
                word-wrap: break-word;
                overflow-wrap: break-word;
                line-height: 1.8;
                font-size: 0.75rem;
                text-align: center;
                display: flex;
                flex-direction: column;
                gap: 3px;
            }

            .grade-line {
                display: block;
                margin: 2px 0;
            }

            .final-label {
                font-size: 0.95rem;
            }

            .final-score {
                font-size: 1rem;
                padding: 8px 12px;
                min-width: 65px;
            }
        }

        /* Small mobile devices */
        @media (max-width: 480px) {
            .tasks-grid {
                grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
                gap: 6px;
            }

            .task-item {
                padding: 6px 3px;
            }

            .task-label {
                font-size: 0.7rem;
            }

            .score-box {
                padding: 5px 2px;
                font-size: 0.9rem;
            }

            .grading-scale {
                font-size: 0.7rem;
                gap: 4px;
            }

            .grade-line {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-info">
            <img src="avatar.jpg" alt="Student Avatar" class="avatar">
            <h1>Ksusha's OGE Progress (ФИПИ tests)</h1>
        </div>
    </header>

    <main class="container" id="app">
    </main>

    <script>
        // ==========================================================
        // НАСТРОЙКИ ДАННЫХ (РЕДАКТИРУЙ ЭТУ ЧАСТЬ)
        // ==========================================================
        
        const studentAvatar = "avatar.jpg";

        const maxScores = {
            "1-4": 4,
            "5": 5,
            "6-11": 6,
            "12": 6,
            "13-19": 7,
            "20-28": 9,
            "29-34": 6,
            "35": 10,
            "Текст": 2,
            "Интервью": 6,
            "Монолог": 7
        };

        const taskGroups = ["1-4", "5", "6-11", "12", "13-19", "20-28", "29-34", "35", "Текст", "Интервью", "Монолог"];
        const finalMaxScore = 68;

        // Данные для 10 вариантов
        // МЕНЯЙ ТОЛЬКО ПЕРВУЮ ЦИФРУ (полученный балл)
        const progressData = [
            {
                variant: 1,
                scores: { "1-4": 2, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0, "Текст": 0, "Интервью": 0, "Монолог": 0 },
                final: 0
            },
            {
                variant: 2,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0, "Текст": 0, "Интервью": 0, "Монолог": 0 },
                final: 0
            },
            {
                variant: 3,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0, "Текст": 0, "Интервью": 0, "Монолог": 0 },
                final: 0
            },
            {
                variant: 4,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0, "Текст": 0, "Интервью": 0, "Монолог": 0 },
                final: 0
            },
            {
                variant: 5,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0, "Текст": 0, "Интервью": 0, "Монолог": 0 },
                final: 0
            },
            {
                variant: 6,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0, "Текст": 0, "Интервью": 0, "Монолог": 0 },
                final: 0
            },
            {
                variant: 7,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0, "Текст": 0, "Интервью": 0, "Монолог": 0 },
                final: 0
            },
            {
                variant: 8,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0, "Текст": 0, "Интервью": 0, "Монолог": 0 },
                final: 0
            },
            {
                variant: 9,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0, "Текст": 0, "Интервью": 0, "Монолог": 0 },
                final: 0
            },
            {
                variant: 10,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0, "Текст": 0, "Интервью": 0, "Монолог": 0 },
                final: 0
            }
        ];

        // ==========================================================
        // ЛОГИКА ОТРИСОВКИ (НЕ МЕНЯТЬ)
        // ==========================================================

        const app = document.getElementById('app');
        const headerAvatar = document.querySelector('.avatar');

        headerAvatar.src = studentAvatar;

        function renderCards() {
            progressData.forEach(data => {
                const card = document.createElement('div');
                card.className = 'variant-card';

                const title = document.createElement('div');
                title.className = 'variant-title';
                title.textContent = `Variant ${data.variant}`;
                card.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'tasks-grid';

                taskGroups.forEach(group => {
                    const item = document.createElement('div');
                    item.className = 'task-item';

                    const label = document.createElement('span');
                    label.className = 'task-label';
                    label.textContent = group;

                    const scoreBox = document.createElement('div');
                    scoreBox.className = 'score-box';
                    scoreBox.textContent = `${data.scores[group]}/${maxScores[group]}`;

                    item.appendChild(label);
                    item.appendChild(scoreBox);
                    grid.appendChild(item);
                });

                card.appendChild(grid);

                // Final result с шкалой оценок
                const finalBlock = document.createElement('div');
                finalBlock.className = 'final-result';

                const finalLabel = document.createElement('span');
                finalLabel.className = 'final-label';
                finalLabel.textContent = 'Final result';

                const gradingScale = document.createElement('span');
                gradingScale.className = 'grading-scale';
                // Добавлены запятые и пробелы между оценками
                gradingScale.innerHTML = '<span class="grade-line">0–28 points - оценка <span class="grade-mark">2</span>, </span><span class="grade-line">29–45 points - оценка <span class="grade-mark">3</span>, </span><span class="grade-line">46–57 points - оценка <span class="grade-mark">4</span>, </span><span class="grade-line">58–68 points - оценка <span class="grade-mark">5</span></span>';

                const finalScore = document.createElement('div');
                finalScore.className = 'final-score';
                finalScore.textContent = `${data.final}/${finalMaxScore}`;

                finalBlock.appendChild(finalLabel);
                finalBlock.appendChild(gradingScale);
                finalBlock.appendChild(finalScore);
                card.appendChild(finalBlock);

                app.appendChild(card);
            });
        }

        renderCards();
    </script>
</body>
</html>
