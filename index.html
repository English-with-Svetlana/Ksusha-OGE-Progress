<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ksusha's OGE Progress (ФИПИ tests)</title>
    <style>
        :root {
            --bg-color: #e0f7fa;
            --card-bg: #ffffff;
            --primary-blue: #0288d1;
            --accent-green: #66bb6a;
            --accent-yellow: #fdd835;
            --text-color: #37474f;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, var(--primary-blue), #4fc3f7);
            color: white;
            padding: 20px;
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            background-color: #fff;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .variant-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent-green);
        }

        .variant-title {
            font-size: 1.4rem;
            color: var(--primary-blue);
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .task-item {
            background-color: #f1f8e9;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #c8e6c9;
        }

        .task-label {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }

        .score-box {
            width: 100%;
            padding: 10px;
            font-size: 1.2rem;
            text-align: center;
            border: 2px solid var(--accent-yellow);
            border-radius: 6px;
            color: var(--primary-blue);
            font-weight: bold;
            background-color: white;
            display: inline-block;
            box-sizing: border-box;
        }

        .final-result {
            background-color: #fffde7;
            border: 2px dashed var(--accent-yellow);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .final-label {
            font-weight: bold;
            font-size: 1.1rem;
            color: #fbc02d;
        }

        .grading-scale {
            font-size: 0.9rem;
            color: #555;
            text-align: center;
            flex: 1;
        }

        .grade-mark {
            color: #d32f2f;
            font-weight: bold;
            font-size: 1rem;
        }

        .final-score {
            padding: 10px 20px;
            font-size: 1.2rem;
            text-align: center;
            border: 2px solid var(--accent-green);
            border-radius: 6px;
            font-weight: bold;
            background-color: white;
            color: var(--primary-blue);
            min-width: 80px;
        }

        @media (max-width: 768px) {
            .final-result {
                flex-direction: column;
                text-align: center;
            }
            
            .grading-scale {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-info">
            <img src="avatar.jpg" alt="Student Avatar" class="avatar">
            <h1>Ksusha's OGE Progress (ФИПИ tests)</h1>
        </div>
    </header>

    <main class="container" id="app">
    </main>

    <script>
        // ==========================================================
        // НАСТРОЙКИ ДАННЫХ (РЕДАКТИРУЙ ЭТУ ЧАСТЬ)
        // ==========================================================
        
        const studentAvatar = "avatar.jpg";

        // Максимальные баллы для каждой группы заданий
        const maxScores = {
            "1-4": 4,
            "5": 5,
            "6-11": 6,
            "12": 6,
            "13-19": 7,
            "20-28": 9,
            "29-34": 6,
            "35": 10
        };

        const taskGroups = ["1-4", "5", "6-11", "12", "13-19", "20-28", "29-34", "35"];
        const finalMaxScore = 68;

        // Данные для 10 вариантов
        // МЕНЯЙ ТОЛЬКО ПЕРВУЮ ЦИФРУ (полученный балл)
        const progressData = [
            {
                variant: 1,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 2,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 3,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 4,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 5,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 6,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 7,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 8,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 9,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 10,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            }
        ];

        // ==========================================================
        // ЛОГИКА ОТРИСОВКИ (НЕ МЕНЯТЬ)
        // ==========================================================

        const app = document.getElementById('app');
        const headerAvatar = document.querySelector('.avatar');

        headerAvatar.src = studentAvatar;

        function renderCards() {
            progressData.forEach(data => {
                const card = document.createElement('div');
                card.className = 'variant-card';

                const title = document.createElement('div');
                title.className = 'variant-title';
                title.textContent = `Variant ${data.variant}`;
                card.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'tasks-grid';

                taskGroups.forEach(group => {
                    const item = document.createElement('div');
                    item.className = 'task-item';

                    const label = document.createElement('span');
                    label.className = 'task-label';
                    label.textContent = group;

                    const scoreBox = document.createElement('div');
                    scoreBox.className = 'score-box';
                    scoreBox.textContent = `${data.scores[group]}/${maxScores[group]}`;

                    item.appendChild(label);
                    item.appendChild(scoreBox);
                    grid.appendChild(item);
                });

                card.appendChild(grid);

                // Final result с шкалой оценок
                const finalBlock = document.createElement('div');
                finalBlock.className = 'final-result';

                const finalLabel = document.createElement('span');
                finalLabel.className = 'final-label';
                finalLabel.textContent = 'Final result';

                const gradingScale = document.createElement('span');
                gradingScale.className = 'grading-scale';
                gradingScale.innerHTML = '0–28 points - оценка <span class="grade-mark">2</span>, 29–45 points - оценка <span class="grade-mark">3</span>, 46–57 points - оценка <span class="grade-mark">4</span>, 58–68 points - оценка <span class="grade-mark">5</span>';

                const finalScore = document.createElement('div');
                finalScore.className = 'final-score';
                finalScore.textContent = `${data.final}/${finalMaxScore}`;

                finalBlock.appendChild(finalLabel);
                finalBlock.appendChild(gradingScale);
                finalBlock.appendChild(finalScore);
                card.appendChild(finalBlock);

                app.appendChild(card);
            });
        }

        renderCards();
    </script>
</body>
</html>
