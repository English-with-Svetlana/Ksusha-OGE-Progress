<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ksusha's OGE Progress</title>
    <style>
        :root {
            /* Цветовая палитра: Голубой, Зеленый, Желтый */
            --bg-color: #e0f7fa; /* Светло-голубой фон */
            --card-bg: #ffffff;
            --primary-blue: #0288d1;
            --accent-green: #66bb6a;
            --accent-yellow: #fdd835;
            --text-color: #37474f;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        /* Шапка */
        header {
            background: linear-gradient(135deg, var(--primary-blue), #4fc3f7);
            color: white;
            padding: 20px;
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            background-color: #fff;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        /* Карточки вариантов */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .variant-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent-green);
        }

        .variant-title {
            font-size: 1.4rem;
            color: var(--primary-blue);
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* Сетка для заданий */
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .task-item {
            background-color: #f1f8e9; /* Очень светлый зеленый */
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #c8e6c9;
        }

        .task-label {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }

        /* Окошки с баллами (только для просмотра) */
        .score-box {
            width: 100%;
            padding: 10px;
            font-size: 1.3rem;
            text-align: center;
            border: 2px solid var(--accent-yellow);
            border-radius: 6px;
            color: var(--primary-blue);
            font-weight: bold;
            background-color: white;
            display: inline-block;
            box-sizing: border-box;
        }

        /* Итоговый результат */
        .final-result {
            background-color: #fffde7; /* Светло-желтый */
            border: 2px dashed var(--accent-yellow);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .final-label {
            font-weight: bold;
            font-size: 1.1rem;
            color: #fbc02d;
        }

        .final-score {
            padding: 10px 20px;
            font-size: 1.3rem;
            text-align: center;
            border: 2px solid var(--accent-green);
            border-radius: 6px;
            font-weight: bold;
            background-color: white;
            color: var(--primary-blue);
        }

    </style>
</head>
<body>

    <header>
        <div class="header-info">
            <!-- Заглушка для аватарки. Замени ссылку на свою картинку -->
            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" alt="Student Avatar" class="avatar">
            <h1>Ksusha's OGE Progress</h1>
        </div>
    </header>

    <main class="container" id="app">
        <!-- Сюда JavaScript будет вставлять карточки -->
    </main>

    <script>
        // ==========================================================
        // НАСТРОЙКИ ДАННЫХ (РЕДАКТИРУЙ ЭТУ ЧАСТЬ В VS CODE)
        // ==========================================================
        
        const studentName = "Ksusha";
        const studentAvatar = "avatar.jpg";

        // Структура заданий для каждого варианта
        const taskGroups = [
            "1-4", "5", "6-11", "12", "13-19", "20-28", "29-34", "35"
        ];

        // Данные для 10 вариантов
        // МЕНЯЙ ЦИФРЫ ТОЛЬКО ЗДЕСЬ!
        const progressData = [
            {
                variant: 1,
                scores: { "1-4": 4, "5": 5, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 2,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 3,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 4,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 5,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 6,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 7,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 8,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 9,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            },
            {
                variant: 10,
                scores: { "1-4": 0, "5": 0, "6-11": 0, "12": 0, "13-19": 0, "20-28": 0, "29-34": 0, "35": 0 },
                final: 0
            }
        ];

        // ==========================================================
        // ЛОГИКА ОТРИСОВКИ (НЕ МЕНЯТЬ)
        // ==========================================================

        const app = document.getElementById('app');
        const headerAvatar = document.querySelector('.avatar');

        headerAvatar.src = studentAvatar;

        function renderCards() {
            progressData.forEach(data => {
                const card = document.createElement('div');
                card.className = 'variant-card';

                const title = document.createElement('div');
                title.className = 'variant-title';
                title.textContent = `Variant ${data.variant}`;
                card.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'tasks-grid';

                taskGroups.forEach(group => {
                    const item = document.createElement('div');
                    item.className = 'task-item';

                    const label = document.createElement('span');
                    label.className = 'task-label';
                    label.textContent = group;

                    // Создаем НЕ редактируемое поле (просто текст в рамке)
                    const scoreBox = document.createElement('div');
                    scoreBox.className = 'score-box';
                    scoreBox.textContent = data.scores[group];

                    item.appendChild(label);
                    item.appendChild(scoreBox);
                    grid.appendChild(item);
                });

                card.appendChild(grid);

                // Блок итогового результата
                const finalBlock = document.createElement('div');
                finalBlock.className = 'final-result';

                const finalLabel = document.createElement('span');
                finalLabel.className = 'final-label';
                finalLabel.textContent = 'Final result';

                const finalScore = document.createElement('div');
                finalScore.className = 'final-score';
                finalScore.textContent = data.final;

                finalBlock.appendChild(finalLabel);
                finalBlock.appendChild(finalScore);
                card.appendChild(finalBlock);

                app.appendChild(card);
            });
        }

        renderCards();

    </script>
</body>
</html>
